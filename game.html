<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game - Three Digit Guessing Game</title>
  <meta name="description" content="Guess the secret 3-digit number. Remaining attempts shown live." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="game" data-game="true" data-max-attempts="10">

  <nav class="navbar">
    <a href="index.html" class="nav-brand">GuessIt</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="game.html" class="nav-link nav-active nav-play">Play Game</a>
      <a href="training.html" class="nav-link">Training</a>
      <a href="practice.html" class="nav-link">Practice</a>
      <a href="scoreboard.html" class="nav-link">Scoreboard</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <div class="nav-user">
        <span class="nav-user-badge" id="nav-user-badge">Player</span>
        <a href="login.html" class="btn btn-logout">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="page-wrapper">
    <div class="card">

      <div class="attempts-bar-wrap">
        <div class="attempts-header">
          <span class="attempts-label">Attempts Remaining</span>
          <span class="attempts-count" id="attempts-count">10 / 10</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuenow="10" aria-valuemax="10">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <h2>Find the Number</h2>
      <p class="page-subtitle">It is between <strong>000</strong> and <strong>999</strong>. Good luck, <strong id="game-username">Player</strong>.</p>

      <div id="feedback-container"></div>

      <form id="guess-form">
        <div class="guess-group">
          <label class="guess-label" for="guess-input">Your Guess</label>
          <div class="guess-input-row">
            <input
              id="guess-input"
              name="guess"
              type="number"
              class="guess-input"
              placeholder="_ _ _"
              min="0"
              max="999"
              autocomplete="off"
              required
            />
            <button type="submit" class="btn btn-guess" id="submit-guess">
              Submit
            </button>
          </div>
        </div>
      </form>

      <div class="history-section">
        <h3>Guess History</h3>
        <ul class="history-list" id="history-list"></ul>
      </div>

      <div id="game-result" hidden>
        <div class="result-icon" id="result-icon"></div>
        <h1 class="result-title" id="result-title"></h1>
        <p class="result-subtitle" id="result-subtitle"></p>
        <div class="secret-reveal" id="result-secret" hidden></div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value" id="stat-attempts-used">0</div>
            <div class="stat-label">Attempts Used</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-attempts-left">0</div>
            <div class="stat-label">Remaining</div>
          </div>
        </div>

        <button type="button" class="btn btn-primary" id="restart-game">Play Again</button>
      </div>

    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
