<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Three Digit Guessing Game</title>
  <meta name="description" content="Create an account to play the Three Digit Number Guessing Game." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body" data-page="register">

  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-panel-left">
      <div class="auth-brand">
        <span class="auth-brand-icon">123</span>
        <h1 class="auth-brand-title">GuessIt</h1>
      </div>
      <p class="auth-brand-desc">
        Join the challenge. Register to start guessing<br>
        3-digit numbers and climb the scoreboard.
      </p>
      <div class="auth-features">
        <div class="auth-feature">
          <span class="auth-feature-icon">Fast</span>
          <span>Instant account creation</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">Safe</span>
          <span>Passwords stay in your browser</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">Play</span>
          <span>Start playing immediately</span>
        </div>
      </div>
    </div>

    <div class="auth-panel-right">
      <div class="auth-card">
        <div class="auth-header">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-subtitle">Join the game - it is free</p>
        </div>

        <form id="register-form" data-static-form data-redirect="index.html" novalidate>
          <div class="field-group">
            <label class="field-label" for="username">
              Username
              <span class="field-hint">At least 3 characters</span>
            </label>
            <div class="field-input-wrap">
              <span class="field-icon">User</span>
              <input
                id="username"
                name="username"
                type="text"
                class="field-input"
                placeholder="Choose a username"
                minlength="3"
                maxlength="30"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="password">
              Password
              <span class="field-hint">At least 6 characters</span>
            </label>
            <div class="field-input-wrap">
              <span class="field-icon">Key</span>
              <input
                id="password"
                name="password"
                type="password"
                class="field-input"
                placeholder="Create a password"
                minlength="6"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" title="Show/hide password">Show</button>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="confirm_password">Confirm Password</label>
            <div class="field-input-wrap">
              <span class="field-icon">OK</span>
              <input
                id="confirm_password"
                name="confirm_password"
                type="password"
                class="field-input"
                placeholder="Re-enter your password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-pw" onclick="togglePassword('confirm_password', this)" title="Show/hide password">Show</button>
            </div>
          </div>

          <div class="strength-wrap" id="strength-wrap" style="display: none;">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label">Weak</span>
          </div>

          <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
        </form>

        <hr class="divider" />

        <p class="auth-switch">
          Already have an account?
          <a href="login.html" class="auth-link">Log in -&gt;</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
